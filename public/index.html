<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Burato Gioielli</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="config.js"></script>
</head>

<body>
  <h1>Burato Gioielli</h1>

  <h2 id="price">Caricamento prezzo...</h2>

  <input id="store" placeholder="Negozio">
  <input id="grams" type="number" placeholder="Grammi">
  <button onclick="add()">Aggiungi</button>
  <button onclick="resetAll()">Reset</button>

  <h3>Totale: <span id="total">0</span> g</h3>

  <table border="1">
    <thead>
      <tr><th>Data</th><th>Negozio</th><th>Grammi</th></tr>
    </thead>
    <tbody id="table"></tbody>
  </table>

<script>
const supabase = supabase.createClient(
  window.BURATO_CONFIG.supabaseUrl,
  window.BURATO_CONFIG.supabaseAnonKey
);

async function loadPrice() {
  const res = await fetch('/api/gold-price');
  const data = await res.json();

  const burato = ((data.price - 15) / 1000 * 730).toFixed(2);
  document.getElementById('price').innerText = burato + ' €/g';
}

async function loadTable() {
  const { data } = await supabase
    .from('gold_entries')
    .select('*')
    .order('created_at', { ascending: false });

  const table = document.getElementById('table');
  table.innerHTML = '';

  let total = 0;

  data.forEach(row => {
    total += parseFloat(row.grams);

    table.innerHTML += `
      <tr>
        <td>${new Date(row.created_at).toLocaleString()}</td>
        <td>${row.store}</td>
        <td>${row.grams}</td>
      </tr>
    `;
  });

  document.getElementById('total').innerText = total.toFixed(2);
}

async function add() {
  const store = document.getElementById('store').value;
  const grams = document.getElementById('grams').value;

  await supabase.from('gold_entries').insert([
    { store, grams }
  ]);

  loadTable();
}

async function resetAll() {
  await supabase.from('gold_entries').delete().neq('id', 0);
  loadTable();
}

loadPrice();
loadTable();
setInterval(loadPrice, 60000);
</script>

</body>
</html>
